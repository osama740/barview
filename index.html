<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barview</title>
</head>
<body>
    <style>
        :root {
            --accent-color: #d4af37;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .maintenance-container {
            text-align: center;
            max-width: 500px;
            padding: 20px;
        }
    .maintenance-container h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 18px 0;
            line-height: 1.4;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .maintenance-container h1 span {
            color: var(--accent-color);
            position: relative;
            display: inline-block;
        }

        .maintenance-container h1 span::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
        }

        .maintenance-container p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin: 0 0 30px 0;
            font-weight: 300;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.25), transparent);
            margin: 25px 0;
        }

        .footer-tag {
            font-size: 0.75rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            opacity: 0.9;
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            background: rgba(212, 175, 55, 0.03);
        }
    </style>

    <div class="bg-glow"></div>

    <div class="maintenance-container">
        <div class="icon-container">
            <div class="icon-ring"></div>
            <div class="icon-ring icon-ring-2"></div>
            <div class="icon-ring icon-ring-3"></div>
            <div class="icon">🥂</div>
        </div>

        <h1><span>Bar View</span></h1>
        
        <p>تم تصميم وإعداد قائمة الطعام, الموقع بإنتظار التفعيل الرسمي والإعتماد النهائي من قبل إدارة المطعم❤️</p>
        
        <div class="divider"></div>
        
        <div class="footer-tag">Waiting</div>
    </div>

</div>
</body>
</html>
